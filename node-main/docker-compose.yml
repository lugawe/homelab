version: "3"

services:
    traefik:
        image: traefik:latest
        container_name: traefik
        restart: unless-stopped
        command:
            - "--providers.docker"
            - "--providers.docker.exposedbydefault=false"
            - "--providers.docker.network=traefik_web"
            - "--entrypoints.web.address=:80"
            - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
            - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
            - "--entrypoints.websecure.address=:443"
            - "--certificatesresolvers.prod.acme.storage=/letsencrypt/acme.json"
            - "--certificatesresolvers.prod.acme.tlschallenge=true"
            - "--certificatesresolvers.prod.acme.email=email"
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - /etc/traefik:/etc/traefik
            - /etc/traefik/letsencrypt:/letsencrypt
        ports:
            - 80:80
            - 443:443
        networks:
            - traefik_web

    authelia:
        image: authelia/authelia:latest
        container_name: authelia
        restart: unless-stopped
        volumes:
            - /etc/authelia:/config
        ports:
            - 9091:9091
        networks:
            - traefik_web
        labels:
            - traefik.enable=true
            - traefik.http.routers.authelia.rule=Host(`auth.domain`)
            - traefik.http.routers.authelia.entrypoints=websecure
            - traefik.http.routers.authelia.tls=true
            - traefik.http.routers.authelia.tls.certresolver=prod
            - traefik.http.middlewares.authelia.forwardauth.address=http://authelia:9091/api/verify?rd=https%3A%2F%2Fauth.domain
            - traefik.http.middlewares.authelia.forwardauth.trustforwardheader=true
            - traefik.http.middlewares.authelia.forwardauth.authresponseheaders=Remote-User,Remote-Groups,Remote-Name,Remote-Email
            - traefik.http.middlewares.authelia_headers.headers.forcestsheader=true
            - traefik.http.middlewares.authelia_headers.headers.stsincludesubdomains=true
            - traefik.http.middlewares.authelia_headers.headers.stspreload=false
            - traefik.http.middlewares.authelia_headers.headers.stsseconds=31536000
            - traefik.http.middlewares.authelia_headers.headers.framedeny=true
            - traefik.http.routers.authelia.middlewares=authelia_headers
        environment:
            - TZ=Europe/Berlin

networks:
    traefik_web:
        name: traefik_web
