theme: auto

jwt_secret: secret

default_redirection_url: domain

default_2fa_method: ""

server:
    host: 0.0.0.0
    port: 9091
    path: ""
    disable_healthcheck: false
    tls:
        key: ""
        certificate: ""
        client_certificates: []

    headers:
        csp_template: ""

authentication_backend:
    refresh_interval: 5m
    file:
        path: /config/users_database.yml
        password:
            algorithm: argon2id
            iterations: 1
            key_length: 32
            salt_length: 16
            memory: 1024
            parallelism: 8
    password_reset:
        disable: false
        custom_url: ""

access_control:
    default_policy: deny
    rules:
        - domain:
              - "authelia domain"
          policy: bypass
        - domain: "domain"
          policy: one_factor

session:
    name: authelia_session
    secret: secret
    expiration: 3600
    inactivity: 300
    domain: domain

regulation:
    max_retries: 3
    find_time: 10m
    ban_time: 12h

storage:
    local:
        path: /config/db.sqlite3
    encryption_key: secret

notifier:
    disable_startup_check: false
    filesystem:
        filename: /config/notification.txt

log:
    level: info
