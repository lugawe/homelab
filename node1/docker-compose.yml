version: "3"

services:
    nginx-proxy-manager:
        image: jc21/nginx-proxy-manager:latest
        container_name: nginx-proxy-manager
        restart: unless-stopped
        volumes:
            - ./data/nginx-proxy-manager/data:/data
            - ./data/nginx-proxy-manager/letsencrypt:/etc/letsencrypt
            - ./data/nginx-proxy-manager/snippets:/snippets:ro
        ports:
            - 80:80
            - 81:81
            - 443:443
        environment:
            - TZ=Europe/Berlin

    authelia:
        image: authelia/authelia:latest
        container_name: authelia
        restart: unless-stopped
        volumes:
            - ./data/authelia/config:/config
        ports:
            - 9091:9091
        environment:
            - TZ=Europe/Berlin

    heimdall:
        image: lscr.io/linuxserver/heimdall:latest
        container_name: heimdall
        restart: unless-stopped
        volumes:
            - ./data/heimdall/config:/config
        ports:
            - 1443:443
        environment:
            - PUID=1000
            - PGID=1000
            - TZ=Europe/Berlin
