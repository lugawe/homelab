theme: auto

jwt_secret: secret

default_redirection_url: https://auth.domain

default_2fa_method: totp

server:
    host: 0.0.0.0
    port: 9091
    disable_healthcheck: false

access_control:
    default_policy: deny
    rules:
        - domain: auth.domain
          policy: bypass
        - domain: heimdall.domain
          policy: one_factor
        - domain: nextcloud.domain
          policy: two_factor

session:
    name: authelia_session
    secret: secret
    expiration: 3600
    inactivity: 300
    domain: domain

authentication_backend:
    refresh_interval: 5m
    file:
        path: /config/users_database.yml
        password:
            algorithm: argon2id
            iterations: 4
            key_length: 32
            salt_length: 16
            memory: 2048
            parallelism: 8
    password_reset:
        disable: true

totp:
    disable: false
    issuer: domain
    algorithm: sha1
    digits: 6
    period: 30
    skew: 1
    secret_size: 32

regulation:
    max_retries: 3
    find_time: 5m
    ban_time: 24h

notifier:
    disable_startup_check: false
    filesystem:
        filename: /config/notification

storage:
    local:
        path: /config/db.sqlite3
    encryption_key: secret

log:
    level: info
