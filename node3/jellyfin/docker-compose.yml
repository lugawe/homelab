version: "3"

services:
    jellyfin:
        image: lscr.io/linuxserver/jellyfin:latest
        container_name: jellyfin
        restart: unless-stopped
        volumes:
            - type: volume
              source: node3
              target: /config
            - type: bind
              source: /mnt/extern_disk/media/movies
              target: /data/movies
              read_only: true
            - type: bind
              source: /mnt/extern_disk/media/series
              target: /data/series
              read_only: true
            - type: bind
              source: /mnt/extern_disk/media/videos
              target: /data/videos
              read_only: true
            - type: bind
              source: /mnt/extern_disk/media/photos
              target: /data/photos
              read_only: true
            - type: bind
              source: /mnt/extern_disk/media/other
              target: /data/other
              read_only: true
        ports:
            - 8096:8096
        environment:
            - PUID=1000
            - PGID=1000
            - TZ=Europe/Berlin

volumes:
    node3:
        external: false
